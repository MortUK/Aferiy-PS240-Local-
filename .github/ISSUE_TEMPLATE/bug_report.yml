name: Bug Report
description: Report a problem with the AFERIY PS240 local integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: versions
    attributes:
      label: Versions
      placeholder: "Integration v1.4.8, Home Assistant 2026.5"
    validations:
      required: true
  - type: input
    id: device_model
    attributes:
      label: Device model and firmware
      placeholder: "AFERIY PS240, firmware shown in device info if available"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      placeholder: Describe what you expected and what happened instead.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Attach or paste the Home Assistant Download Diagnostics output if possible.
      render: json
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
