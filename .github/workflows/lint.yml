name: Lint

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python syntax
        run: python -m compileall custom_components/aecc_battery
